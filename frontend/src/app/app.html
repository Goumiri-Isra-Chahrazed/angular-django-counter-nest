<div  [class.red]="counterService.counter >= 10"
  [class.green]="counterService.counter <= -10">
<h1>CounterNest :</h1>
  <h1>{{ counterService.counter }}</h1>

<nav>
  <a routerLink="/up">⬆️ Up</a> |
  <a routerLink="/down">⬇️ Down</a> |
  <a routerLink="/reset">🔄 Reset</a>
</nav>

<hr />

<router-outlet></router-outlet>
</div>
